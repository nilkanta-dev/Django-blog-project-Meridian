<div class="relative">
  
    {% for error in field.errors %}
    <p class="text-red-400">*{{ error }}</p>
  {% endfor %}
  <div class="relative inline-block w-full">
    {{field}}
    <button type="button" id="toggle_{{ field_id }}" 
            class="absolute top-1/2 -translate-y-1/2 right-3 text-gray-500 hover:text-gray-700">
      <!-- Open eye (hidden by default) -->
      <svg id="eyeOpen_{{ field_id }}" xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 hidden" fill="none"
           viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M2.458 12C3.732 7.943 7.523 5 12 5c4.477 0 8.268 2.943 9.542 7-1.274 4.057-5.065 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
      </svg>
      <!-- Closed eye (visible by default) -->
      <svg id="eyeClosed_{{ field_id }}" xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none"
           viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.269-2.943-9.543-7a9.97 9.97 0 012.479-4.162m3.367-2.64A9.956 9.956 0 0112 5c4.478 0 8.269 2.943 9.543 7a9.97 9.97 0 01-1.284 2.91M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M3 3l18 18" />
      </svg>
    </button>
  </div>
</div>
