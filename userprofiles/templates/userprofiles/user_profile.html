{% extends 'userprofiles/dashboard.html' %}

{% block content %}


<main class="flex-1 p-8">
    <h1 class="text-2xl font-bold mb-6">Your Profile</h1>

    <form method="post" enctype="multipart/form-data" class="bg-white shadow rounded-xl p-6 space-y-6">
        {% csrf_token %}

        <!-- Username -->
        <div>
            <label for="username" class="block text-gray-700 font-medium mb-1">Username</label>
            <input type="text" id="username" name="username" 
                   value="{{ user.username }}"
                   class="w-full border border-gray-300 rounded-lg p-2 focus:ring focus:ring-blue-300 focus:outline-none">
        </div>

        <!-- Email -->
        <div>
            <label for="email" class="block text-gray-700 font-medium mb-1">Email</label>
            <input type="email" id="email" name="email" 
                   value="{{ user.email }}"
                   class="w-full border border-gray-300 rounded-lg p-2 focus:ring focus:ring-blue-300 focus:outline-none">
        </div>

        <!-- First Name -->
        <div>
            <label for="first_name" class="block text-gray-700 font-medium mb-1">First Name</label>
            <input type="text" id="first_name" name="first_name" 
                   value="{{ user.first_name }}"
                   class="w-full border border-gray-300 rounded-lg p-2 focus:ring focus:ring-blue-300 focus:outline-none">
        </div>

        <!-- Last Name -->
        <div>
            <label for="last_name" class="block text-gray-700 font-medium mb-1">Last Name</label>
            <input type="text" id="last_name" name="last_name" 
                   value="{{ user.last_name }}"
                   class="w-full border border-gray-300 rounded-lg p-2 focus:ring focus:ring-blue-300 focus:outline-none">
        </div>


        <!-- Avatar -->
       <div>
            <label for="avatar" class="block text-gray-700 font-medium mb-1">Profile Picture</label>
            {% if user.profile.avatar %}
            <img src="{{ user.profile.avatar.url }}" alt="Current Avatar"
             class="w-20 h-20 rounded-full mb-2 object-cover border border-gray-300">
            {% endif %}
            <input type="file" id="avatar" name="avatar"
           class="w-full border border-gray-300 rounded-lg p-2 focus:ring focus:ring-blue-300 focus:outline-none">
        </div>


        <!-- Bio (from Profile model) -->
        <div>
            <label for="bio" class="block text-gray-700 font-medium mb-1">Bio</label>
            <textarea id="bio" name="bio" rows="4"
                      class="w-full border border-gray-300 rounded-lg p-2 focus:ring focus:ring-blue-300 focus:outline-none">{{ user.profile.bio }}</textarea>
        </div>

        <!-- Actions -->
        <div class="flex space-x-3">
            <button type="submit" 
                    class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition">
                Save
            </button>
            <a href="{% url 'dashboard' %}" 
               class="px-4 py-2 bg-gray-400 text-white rounded-lg hover:bg-gray-500 transition">
                Cancel
            </a>
        </div>
    </form>
</main>

{% endblock %}
