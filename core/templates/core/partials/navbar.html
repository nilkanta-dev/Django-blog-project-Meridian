<!-- Navbar -->
<nav>
    <ul class="flex flex-col sm:flex-row sm:space-x-6 space-y-2 sm:space-y-0 items-start sm:items-center text-sm sm:text-base">
        <!-- Static Links -->
        <li><a href="/" class="hover:text-indigo-300">Home</a></li>
        <li><a href="" class="hover:text-indigo-300">About</a></li>

        {% if user.is_authenticated %}
        <!-- Dropdown -->
        <li class="relative w-full sm:w-auto" x-data="{ open: false }">
            <!-- Trigger -->
            <button @click="open = !open"
                    class="flex justify-between sm:justify-start items-center w-full sm:w-auto space-x-1 bg-gray-800 px-3 py-2 rounded-md text-white">
                <span>
                    Welcome, <span class="text-yellow-400">{{ user.username|capfirst }}</span>
                </span>
                <svg class="w-4 h-4 transform transition-transform duration-200"
                     :class="{ 'rotate-180': open }"
                     xmlns="http://www.w3.org/2000/svg" fill="none"
                     viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round"
                          stroke-width="2" d="M19 9l-7 7-7-7" />
                </svg>
            </button>

            <!-- Dropdown Menu -->
            <div x-show="open"
                 @click.away="open = false"
                 class="absolute right-0 sm:left-0 mt-2 w-40 bg-white rounded-md shadow-lg z-20">
                <a href="{% url 'dashboard' %}"
                   class="block px-4 py-2 text-gray-700 hover:bg-gray-100">
                    Dashboard
                </a>
                <form method="POST" action="{% url 'signout' %}">
                    {% csrf_token %}
                    <button type="submit"
                            class="block w-full text-left px-4 py-2 text-gray-700 hover:bg-gray-100">
                        Sign out
                    </button>
                </form>
            </div>
        </li>

        {% else %}
        <!-- Guest Links -->
        <li>
            <a href="{% url 'sign-up' %}"
               class="hover:text-indigo-300 flex items-center">
                <i class="fas fa-user-plus mr-2"></i>Sign Up
            </a>
        </li>
        <li>
            <a href="/signin/"
               class="hover:text-indigo-300 flex items-center">
                <i class="fas fa-sign-in-alt mr-2"></i>Sign In
            </a>
        </li>
        {% endif %}
    </ul>
</nav>
