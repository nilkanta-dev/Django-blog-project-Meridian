{% extends "core/base.html" %}

{% block content %}
<div class="max-w-2xl mx-auto bg-white p-6 rounded-lg shadow mt-10">
  <h2 class="text-xl font-bold mb-4 text-gray-800">Edit Comment</h2>

  <form method="post">
    {% csrf_token %}
    <textarea name="content" rows="4"
      class="w-full text-black p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none"
    >{{ comment.content }}</textarea>

    <div class="mt-4 flex space-x-3">
      <button type="submit"
        class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition">
        Save Changes
      </button>
      <a href="{% url 'post-detail' slug=comment.post.slug %}"
         class="px-4 py-2 bg-gray-300 text-gray-700 rounded-lg hover:bg-gray-400 transition">
        Cancel
      </a>
    </div>
  </form>
</div>
{% endblock %}
